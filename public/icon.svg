<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <style>
      .cls-1 {
        fill: #fcfcfc;
        stroke: #fff;
        stroke-width: 1px;
        filter: url(#filter);
      }
    </style>
    <filter id="filter" x="0" y="0" width="64" height="64" filterUnits="userSpaceOnUse">
      <feFlood result="flood" flood-color="#f89937"/>
      <feComposite result="composite" operator="in" in2="SourceGraphic"/>
      <feBlend result="blend" in2="SourceGraphic"/>
    </filter>
    <image id="image" width="52" height="18" xlink:href="data:img/png;base64,"/>
  </defs>
  <g style="fill: #fcfcfc; filter: url(#filter)">
    <rect id="rect" class="cls-1" width="64" height="64" rx="14" ry="14" style="stroke: inherit; filter: none; fill: inherit"/>
  </g>
  <use xlink:href="#rect" style="stroke: #fff; filter: none; fill: none"/>
  <use id="logo" x="6" y="23" xlink:href="#image"/>
  <use id="logo_copy" data-name="logo copy" x="6" y="23" xlink:href="#image"/>
  <use id="logo_copy_2" data-name="logo copy 2" x="6" y="23" xlink:href="#image"/>
</svg>
